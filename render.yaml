services:
  # ── 1. Backend: Socket.IO Server ──────────────────────────
  - type: web
    name: igisoro-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        # Set this AFTER deploying the client — paste the client's .onrender.com URL here
        value: https://igisoro-client.onrender.com

  # ── 2. Frontend: Vite Static Site ─────────────────────────
  - type: web
    name: igisoro-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SERVER_URL
        # Set this to your igisoro-server URL after backend is deployed
        value: https://igisoro-server.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
